build:
  stage: build
  image: node
  script:
  - apt-get update
  - apt-get install -y rpm
  - npm install
  - npm run build
  artifacts:
    untracked: true
  only:
  - master

pages:
  stage: deploy
  image: node
  needs: [build]
  dependencies: 
    - build
  script:
  - mkdir .public
  - cp -r page/* .public
  - mv .public public
  artifacts:
    paths:
    - public
  only:
  - master

publish_snap:
  image: ubuntu:18.04
  stage: deploy
  needs: [build]
  dependencies: 
    - build
  script:
    - apt-get update -qy
    - apt-get install -y snapcraft 
    - echo $SNAPCRAFT_LOGIN_FILE | base64 --decode --ignore-garbage > snapcraft.login
    - snapcraft login --with snapcraft.login
    - snapcraft push dist/*.snap --release edge
  only:
    - master